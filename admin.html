<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meddy — Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Fraunces:ital,opsz,wght@0,9..144,700;1,9..144,300&display=swap" rel="stylesheet">
<style>
  :root {
    --teal: #1aaa8e; --teal-dark: #0d6e5a; --teal-light: #e6f7f4;
    --ink: #0f1a17; --ink-mid: #3a4e49; --ink-light: #6b7f7a;
    --surface: #ffffff; --border: #d4ede8; --border-dark: #a8d8cf;
    --error: #dc2626; --error-bg: #fef2f2; --error-border: #fecaca;
    --font-body: 'Inter', sans-serif; --font-display: 'Fraunces', serif;
    --radius-sm: 6px; --radius-md: 12px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font-body); background: #f4faf8; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; -webkit-font-smoothing: antialiased; }
  @keyframes fadeUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
  @keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-7px)} 40%{transform:translateX(7px)} 60%{transform:translateX(-4px)} 80%{transform:translateX(4px)} }

  .login-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius-md); padding: 48px 40px;
    width: 100%; max-width: 400px;
    animation: fadeUp 0.45s ease both;
    box-shadow: 0 4px 24px rgba(26,170,142,0.08);
  }
  .login-brand { text-align: center; margin-bottom: 36px; }
  .login-logo { height: 36px; width: auto; }
  .login-wordmark { display: none; font-family: var(--font-body); font-size: 26px; font-weight: 800; color: var(--teal); letter-spacing: -0.5px; }
  .login-label { font-size: 11px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; color: var(--ink-light); margin-top: 10px; }

  .form-group { display: flex; flex-direction: column; gap: 5px; margin-bottom: 14px; }
  .form-group label { font-size: 12px; font-weight: 600; color: var(--ink-mid); }
  .form-group input {
    padding: 11px 14px; border: 1px solid var(--border-dark);
    border-radius: var(--radius-sm); font-size: 14px; color: var(--ink);
    font-family: var(--font-body); background: var(--surface);
    transition: border-color 0.18s;
  }
  .form-group input:focus { outline: none; border-color: var(--teal); box-shadow: 0 0 0 3px rgba(26,170,142,0.12); }
  .form-group input.error { border-color: var(--error); }

  .error-msg {
    display: none; background: var(--error-bg); border: 1px solid var(--error-border);
    border-radius: var(--radius-sm); padding: 10px 14px;
    font-size: 13px; color: var(--error); margin-bottom: 14px; text-align: center;
  }
  .error-msg.show { display: block; }

  .btn-login {
    width: 100%; padding: 13px; border-radius: var(--radius-sm);
    font-size: 15px; font-weight: 700; color: #fff;
    background: var(--teal); border: none; cursor: pointer;
    transition: background 0.18s; font-family: var(--font-body);
    margin-top: 8px;
  }
  .btn-login:hover { background: var(--teal-dark); }
  .btn-login:active { transform: scale(0.99); }

  .shake { animation: shake 0.4s ease; }

  .back-link { display: block; text-align: center; margin-top: 20px; font-size: 13px; color: var(--ink-light); }
  .back-link a { color: var(--teal); }
  .back-link a:hover { text-decoration: underline; }
</style>
</head>
<body>
<div class="login-card" id="login-card">
  <div class="login-brand">
    <img src="/logo.png" alt="Meddy" class="login-logo" onerror="this.style.display='none';this.nextElementSibling.style.display='block'">
    <span class="login-wordmark">meddy</span>
    <p class="login-label">Admin Access</p>
  </div>

  <div class="error-msg" id="error-msg">Incorrect credentials. Try again.</div>

  <div class="form-group">
    <label for="username">Username</label>
    <input type="email" id="username" placeholder="admin@meddy.co.in" autocomplete="username">
  </div>
  <div class="form-group">
    <label for="password">Password</label>
    <input type="password" id="password" placeholder="••••••••••" autocomplete="current-password">
  </div>
  <button class="btn-login" onclick="doLogin()">Sign In</button>

  <p class="back-link"><a href="/">← Back to Meddy</a></p>
</div>

<script>
  document.getElementById('password').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') doLogin();
  });

  function doLogin() {
    var u = document.getElementById('username').value.trim();
    var p = document.getElementById('password').value;
    var card = document.getElementById('login-card');
    var err = document.getElementById('error-msg');

    if (u === 'superadmin@meddy.co.in' && p === '20@5@1997') {
      sessionStorage.setItem('meddy_admin_auth', 'true');
      window.location.href = '/admin/dashboard';
    } else {
      err.classList.add('show');
      card.classList.remove('shake');
      void card.offsetWidth; // reflow to restart animation
      card.classList.add('shake');
      document.getElementById('password').value = '';
      document.getElementById('password').focus();
    }
  }
</script>
</body>
</html>
