<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meddy — Coming Soon</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; background: #0F1623; display: flex; align-items: center; justify-content: center; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
.wrap { text-align: center; }
.dot { width: 10px; height: 10px; border-radius: 50%; background: #534AB7; box-shadow: 0 0 20px rgba(83,74,183,0.6); margin: 0 auto 16px; }
.name { font-size: 24px; font-weight: 600; color: rgba(255,255,255,0.9); letter-spacing: -.5px; margin-bottom: 8px; }
.sub { font-size: 14px; color: rgba(255,255,255,0.3); }
</style>
</head>
<body>
<div class="wrap">
  <div class="dot"></div>
  <div class="name">Meddy</div>
  <div class="sub">Coming soon.</div>
</div>
</body>
</html>
